<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Illegal Lemon Empire</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1f3a 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #fff;
        }

        #gameContainer {
            display: flex;
            gap: 20px;
            max-width: 1200px;
            width: 90%;
        }

        #gameScreen {
            flex: 1;
            background: #000;
            border: 3px solid #ffff00;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(255, 255, 0, 0.6), inset 0 0 20px rgba(255, 255, 0, 0.1);
            overflow: hidden;
        }

        #gameCanvas {
            display: block;
            width: 100%;
            height: auto;
        }

        #ui {
            flex: 0 0 280px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        #stats {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ffff00;
            border-radius: 10px;
            padding: 15px;
            font-size: 16px;
            box-shadow: 0 0 15px rgba(255, 255, 0, 0.2);
        }

        .stat {
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stat:last-child {
            border-bottom: none;
        }

        .stat-value {
            font-weight: bold;
            color: #ffff00;
            font-size: 18px;
        }

        #riskMeterContainer {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ff6600;
            border-radius: 10px;
            padding: 12px;
            box-shadow: 0 0 15px rgba(255, 102, 0, 0.2);
        }

        #riskMeterLabel {
            color: #ff6600;
            font-weight: bold;
            margin-bottom: 8px;
            font-size: 14px;
        }

        #riskMeterBar {
            width: 100%;
            height: 24px;
            background: #333;
            border: 2px solid #ff6600;
            border-radius: 5px;
            overflow: hidden;
            position: relative;
        }

        #riskMeterFill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00ff00 0%, #ffff00 50%, #ff6600 80%, #ff0000 100%);
            transition: width 0.1s linear;
            box-shadow: 0 0 10px rgba(255, 102, 0, 0.8);
        }

        #riskMeterText {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-weight: bold;
            font-size: 12px;
            text-shadow: 0 0 5px #000;
            pointer-events: none;
        }

        #gameStatus {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ffff00;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 0 15px rgba(255, 255, 0, 0.2);
        }

        #gameTitle {
            font-size: 22px;
            color: #ffff00;
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 255, 0, 0.8);
            font-weight: bold;
        }

        #gameMessage {
            font-size: 13px;
            color: #fff;
            margin: 10px 0;
            min-height: 50px;
            line-height: 1.4;
        }

        #controls {
            background: rgba(0, 0, 0, 0.8);
            border: 2px solid #ffff00;
            border-radius: 10px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 0 15px rgba(255, 255, 0, 0.2);
        }

        .btn {
            background: linear-gradient(135deg, #ffff00 0%, #ffdd00 100%);
            color: #000;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            margin: 10px 0;
            width: 100%;
            transition: all 0.3s;
            text-transform: uppercase;
            box-shadow: 0 0 10px rgba(255, 255, 0, 0.4);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 255, 0, 0.8);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .controlText {
            font-size: 12px;
            color: #aaa;
            margin-top: 10px;
            line-height: 1.4;
        }

        @media (max-width: 900px) {
            #gameContainer {
                flex-direction: column;
            }
            
            #ui {
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="gameScreen">
            <canvas id="gameCanvas" width="800" height="600"></canvas>
        </div>
        
        <div id="ui">
            <div id="stats">
                <div class="stat">💰 Money: <span class="stat-value">$<span id="money">0</span></span></div>
                <div class="stat">🍋 Lemons: <span class="stat-value"><span id="lemons">0</span></span></div>
            </div>

            <div id="riskMeterContainer">
                <div id="riskMeterLabel">⚠️ SCANDAL RISK</div>
                <div id="riskMeterBar">
                    <div id="riskMeterFill"></div>
                    <div id="riskMeterText"><span id="riskPercent">0</span>%</div>
                </div>
            </div>

            <div id="gameStatus">
                <h1 id="gameTitle">ILLEGAL LEMON EMPIRE</h1>
                <p id="gameMessage">Click to start selling lemons!</p>
            </div>
            
            <div id="controls">
                <button id="startBtn" class="btn">START GAME</button>
                <button id="restartBtn" class="btn" style="display:none;">RESTART</button>
                <p class="controlText">WASD/Arrow Keys to move | SPACE to sell lemon | Click location to enter</p>
            </div>
        </div>
    </div>
    
    <script>
// ==================== GAME VARIABLES ====================
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameState = 'menu';
let gameOver = false;

// Locations
const locations = {
    hub: { x: 400, y: 300, name: 'HUB', color: '#ffff00', type: 'hub' },
    blackMarket: { x: 100, y: 100, name: 'BLACK MARKET', color: '#ff00ff', type: 'shop' },
    docks: { x: 700, y: 100, name: 'DOCKS', color: '#0099ff', type: 'afk' },
    suburbs: { x: 100, y: 500, name: 'SUBURBS', color: '#00ff99', type: 'lowrisk' },
    underground: { x: 700, y: 500, name: 'UNDERGROUND ORCHARD', color: '#ff6600', type: 'grow' }
};

let currentLocation = 'hub';
let inLocation = false;

// Player
const player = {
    x: 400,
    y: 300,
    width: 30,
    height: 40,
    speed: 3,
    vx: 0,
    vy: 0
};

// Game Stats
let money = 0;
let lemons = 0;
let riskLevel = 0;
let maxRisk = 100;
let harvestTimer = 0;
let growTimer = 0;
let scandalCheckTimer = 0;

// Upgrades
let upgrades = {
    sellingPrice: 1.0,
    sellingSpeed: 1.0,
    lemonCapacity: 20,
    riskReduction: 1.0,
    purchased: []
};

// Shop items
const shopItems = [
    { id: 'priceBoost', name: 'Better Sales Pitch', cost: 50, effect: 'Increases selling price by 25%' },
    { id: 'fastSell', name: 'Speed Boost', cost: 75, effect: 'Sell faster' },
    { id: 'capacity', name: 'Bigger Backpack', cost: 40, effect: 'Hold 30 lemons' },
    { id: 'riskShield', name: 'Legal Advisor', cost: 100, effect: 'Reduces scandal risk' }
];

// Keys
const keys = {};

// Customers
let customers = [];
let customerSpawnTimer = 0;

// Particles for visual effects
let particles = [];

// Location UI vars
let inShop = false;
let shopMessage = '';

// ==================== EVENT LISTENERS ====================
document.addEventListener('keydown', (e) => {
    keys[e.key.toLowerCase()] = true;
    
    if (e.key === ' ' && gameState === 'playing' && !inLocation) {
        e.preventDefault();
        sellLemon();
    }
    
    if (e.key === 'Escape') {
        if (inLocation) {
            exitLocation();
        }
    }
});

document.addEventListener('keyup', (e) => {
    keys[e.key.toLowerCase()] = false;
});

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);

canvas.addEventListener('click', (e) => {
    if (gameState === 'menu') {
        startGame();
    } else if (gameState === 'playing' && !inLocation) {
        const rect = canvas.getBoundingClientRect();
        const clickX = (e.clientX - rect.left) * (canvas.width / rect.width);
        const clickY = (e.clientY - rect.top) * (canvas.height / rect.height);
        
        for (let [locKey, loc] of Object.entries(locations)) {
            const dist = Math.sqrt((clickX - loc.x) ** 2 + (clickY - loc.y) ** 2);
            if (dist < 40) {
                enterLocation(locKey);
            }
        }
    } else if (inLocation && inShop) {
        const rect = canvas.getBoundingClientRect();
        const clickX = (e.clientX - rect.left) * (canvas.width / rect.width);
        const clickY = (e.clientY - rect.top) * (canvas.height / rect.height);
        
        shopItems.forEach((item, idx) => {
            const itemY = 120 + idx * 60;
            if (clickX > 50 && clickX < 350 && clickY > itemY && clickY < itemY + 50) {
                purchaseUpgrade(item);
            }
        });
    }
});

// ==================== GAME FUNCTIONS ====================
function startGame() {
    gameState = 'playing';
    gameOver = false;
    money = 0;
    lemons = 0;
    riskLevel = 0;
    harvestTimer = 0;
    currentLocation = 'hub';
    inLocation = false;
    customers = [];
    particles = [];
    scandalCheckTimer = 0;
    
    upgrades = {
        sellingPrice: 1.0,
        sellingSpeed: 1.0,
        lemonCapacity: 20,
        riskReduction: 1.0,
        purchased: []
    };
    
    player.x = locations.hub.x;
    player.y = locations.hub.y;
    
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('restartBtn').style.display = 'none';
    document.getElementById('gameMessage').textContent = 'Travel to locations to grow your empire!\n\nBut be careful—the higher the risk, the greater the chance of scandal...';
    
    gameLoop();
}

function enterLocation(locKey) {
    currentLocation = locKey;
    inLocation = true;
    inShop = false;
    shopMessage = '';
    const loc = locations[locKey];
    
    if (loc.type === 'shop') {
        inShop = true;
    }
}

function exitLocation() {
    inLocation = false;
    inShop = false;
    shopMessage = '';
    player.x = locations.hub.x;
    player.y = locations.hub.y;
    currentLocation = 'hub';
}

function purchaseUpgrade(item) {
    if (money >= item.cost && !upgrades.purchased.includes(item.id)) {
        money -= item.cost;
        upgrades.purchased.push(item.id);
        
        switch(item.id) {
            case 'priceBoost':
                upgrades.sellingPrice *= 1.25;
                break;
            case 'fastSell':
                upgrades.sellingSpeed *= 1.5;
                break;
            case 'capacity':
                upgrades.lemonCapacity = 30;
                break;
            case 'riskShield':
                upgrades.riskReduction = 0.5;
                break;
        }
        
        shopMessage = `Purchased ${item.name}!`;
        setTimeout(() => { shopMessage = ''; }, 2000);
    }
}

function sellLemon() {
    if (lemons > 0 && !inLocation) {
        lemons--;
        const baseProfit = Math.floor(Math.random() * 8) + 5;
        const profit = Math.floor(baseProfit * upgrades.sellingPrice);
        money += profit;
        
        const riskIncrease = (Math.random() * 15 + 5) * upgrades.riskReduction;
        riskLevel += riskIncrease;
        
        // Create visual particles
        for (let i = 0; i < 8; i++) {
            particles.push({
                x: player.x,
                y: player.y,
                vx: (Math.random() - 0.5) * 10,
                vy: (Math.random() - 0.5) * 10,
                life: 40,
                char: '💰'
            });
        }
        
        if (riskLevel > maxRisk) {
            riskLevel = maxRisk;
        }
        
        checkForScandal();
    }
}

function checkForScandal() {
    const riskPercent = (riskLevel / maxRisk) * 100;
    const caughtChance = Math.pow(riskPercent / 100, 2);
    
    if (Math.random() < caughtChance) {
        endGame('SCANDAL EXPOSED!\n\nYour illegal lemon operation was discovered!');
    }
}

function updatePlayer() {
    if (inLocation) return;
    
    player.vx = 0;
    player.vy = 0;
    
    if (keys['w'] || keys['arrowup']) player.vy = -player.speed;
    if (keys['s'] || keys['arrowdown']) player.vy = player.speed;
    if (keys['a'] || keys['arrowleft']) player.vx = -player.speed;
    if (keys['d'] || keys['arrowright']) player.vx = player.speed;
    
    player.x += player.vx;
    player.y += player.vy;
    
    player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
    player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));
}

function updateCustomers() {
    if (inLocation || currentLocation !== 'hub') return;
    
    customerSpawnTimer--;
    if (customerSpawnTimer <= 0) {
        spawnCustomer();
        customerSpawnTimer = 60 + Math.random() * 60;
    }
    
    for (let i = customers.length - 1; i >= 0; i--) {
        const c = customers[i];
        
        const dx = player.x - c.x;
        const dy = player.y - c.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        
        if (dist > 5) {
            c.x += (dx / dist) * c.speed;
            c.y += (dy / dist) * c.speed;
        }
        
        if (dist < 40) {
            customers.splice(i, 1);
            if (lemons > 0) {
                lemons--;
                money += Math.floor(Math.random() * 15) + 10;
                riskLevel += (Math.random() * 20 + 10) * upgrades.riskReduction;
                
                for (let j = 0; j < 6; j++) {
                    particles.push({
                        x: c.x,
                        y: c.y,
                        vx: (Math.random() - 0.5) * 12,
                        vy: (Math.random() - 0.5) * 12,
                        life: 35,
                        char: '$'
                    });
                }
                
                checkForScandal();
            }
        }
    }
}

function spawnCustomer() {
    const side = Math.floor(Math.random() * 4);
    let x, y;
    
    switch(side) {
        case 0: x = Math.random() * canvas.width; y = -20; break;
        case 1: x = canvas.width + 20; y = Math.random() * canvas.height; break;
        case 2: x = Math.random() * canvas.width; y = canvas.height + 20; break;
        case 3: x = -20; y = Math.random() * canvas.height; break;
    }
    
    customers.push({
        x: x,
        y: y,
        width: 25,
        height: 30,
        speed: 2 + Math.random() * 1.5
    });
}

function updateLocationEvents() {
    if (!inLocation) return;
    
    const loc = locations[currentLocation];
    
    if (loc.type === 'afk') {
        harvestTimer++;
        if (harvestTimer > 120) {
            lemons += 2;
            money += 5;
            if (lemons > upgrades.lemonCapacity) {
                lemons = upgrades.lemonCapacity;
            }
            harvestTimer = 0;
        }
    } else if (loc.type === 'grow') {
        growTimer++;
        if (growTimer > 180) {
            lemons += 5;
            if (lemons > upgrades.lemonCapacity) {
                lemons = upgrades.lemonCapacity;
            }
            growTimer = 0;
        }
    } else if (loc.type === 'lowrisk') {
        if (lemons > 0 && Math.random() < 0.02) {
            lemons--;
            money += Math.floor(Math.random() * 4) + 3;
            riskLevel += (Math.random() * 5 + 1);
        }
    }
}

function updateParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.x += p.vx;
        p.y += p.vy;
        p.vy += 0.3; // gravity
        p.life--;
        
        if (p.life <= 0) {
            particles.splice(i, 1);
        }
    }
}

function updateRiskDecay() {
    if (lemons === 0 && money > 100) {
        riskLevel -= 0.2;
    }
    riskLevel = Math.max(0, riskLevel);
}

function update() {
    if (gameState !== 'playing') return;
    
    updatePlayer();
    updateCustomers();
    updateParticles();
    updateLocationEvents();
    updateRiskDecay();
    
    // Update UI
    document.getElementById('money').textContent = money;
    document.getElementById('lemons').textContent = lemons;
    
    const riskPercent = Math.floor((riskLevel / maxRisk) * 100);
    document.getElementById('riskPercent').textContent = Math.min(riskPercent, 100);
    document.getElementById('riskMeterFill').style.width = Math.min(riskPercent, 100) + '%';
}

function drawWorldMap() {
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    // Grid background
    ctx.strokeStyle = 'rgba(255, 255, 0, 0.05)';
    ctx.lineWidth = 1;
    for (let x = 0; x < canvas.width; x += 80) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
    }
    for (let y = 0; y < canvas.height; y += 80) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(canvas.width, y);
        ctx.stroke();
    }
    
    // Draw location connections
    ctx.strokeStyle = 'rgba(200, 200, 200, 0.2)';
    ctx.lineWidth = 2;
    const locArray = Object.values(locations);
    for (let i = 0; i < locArray.length; i++) {
        for (let j = i + 1; j < locArray.length; j++) {
            ctx.beginPath();
            ctx.moveTo(locArray[i].x, locArray[i].y);
            ctx.lineTo(locArray[j].x, locArray[j].y);
            ctx.stroke();
        }
    }
    
    // Draw locations
    for (let [key, loc] of Object.entries(locations)) {
        ctx.fillStyle = loc.color;
        ctx.globalAlpha = 0.6;
        ctx.fillRect(loc.x - 35, loc.y - 35, 70, 70);
        ctx.globalAlpha = 1;
        
        ctx.strokeStyle = loc.color;
        ctx.lineWidth = 3;
        ctx.shadowColor = loc.color;
        ctx.shadowBlur = 10;
        ctx.strokeRect(loc.x - 35, loc.y - 35, 70, 70);
        ctx.shadowColor = 'transparent';
        
        ctx.fillStyle = '#000';
        ctx.font = 'bold 11px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(loc.name, loc.x, loc.y);
    }
    
    // Draw customers
    for (let c of customers) {
        ctx.fillStyle = 'rgba(0, 255, 0, 0.3)';
        ctx.beginPath();
        ctx.arc(c.x, c.y, 15, 0, Math.PI * 2);
        ctx.fill();
        
        ctx.fillStyle = '#00ff00';
        ctx.font = 'bold 20px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('💵', c.x, c.y);
    }
    
    // Draw particles
    for (let p of particles) {
        ctx.globalAlpha = p.life / 40;
        ctx.font = 'bold 20px Arial';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(p.char, p.x, p.y);
    }
    ctx.globalAlpha = 1;
    
    // Draw player
    ctx.fillStyle = 'rgba(255, 255, 0, 0.2)';
    ctx.beginPath();
    ctx.arc(player.x, player.y, 25, 0, Math.PI * 2);
    ctx.fill();
    
    ctx.fillStyle = '#ffff00';
    ctx.font = 'bold 32px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🍋', player.x, player.y);
    
    // Risk meter on canvas
    drawRiskMeterOnCanvas();
    
    // Instructions
    ctx.fillStyle = '#ffffff';
    ctx.font = '12px Arial';
    ctx.textAlign = 'left';
    ctx.fillText('WASD to move | Click location to enter', 10, 40);
    ctx.fillText('SPACE to sell | ESC to exit location', 10, 55);
}

function drawRiskMeterOnCanvas() {
    const meterX = 10;
    const meterY = canvas.height - 40;
    const meterWidth = 200;
    const meterHeight = 20;
    
    const riskPercent = (riskLevel / maxRisk) * 100;
    
    // Background
    ctx.fillStyle = '#333333';
    ctx.fillRect(meterX, meterY, meterWidth, meterHeight);
    
    // Fill
    const fillWidth = (riskPercent / 100) * meterWidth;
    const gradient = ctx.createLinearGradient(meterX, meterY, meterX + fillWidth, meterY);
    gradient.addColorStop(0, '#00ff00');
    gradient.addColorStop(0.5, '#ffff00');
    gradient.addColorStop(0.8, '#ff6600');
    gradient.addColorStop(1, '#ff0000');
    
    ctx.fillStyle = gradient;
    ctx.fillRect(meterX, meterY, fillWidth, meterHeight);
    
    // Border
    ctx.strokeStyle = '#ff6600';
    ctx.lineWidth = 2;
    ctx.strokeRect(meterX, meterY, meterWidth, meterHeight);
    
    // Text
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 11px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(`RISK: ${Math.floor(riskPercent)}%`, meterX + meterWidth / 2, meterY + meterHeight / 2);
}

function drawLocation() {
    const loc = locations[currentLocation];
    
    ctx.fillStyle = loc.color;
    ctx.globalAlpha = 0.1;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = 1;
    
    ctx.fillStyle = loc.color;
    ctx.font = 'bold 32px Arial';
    ctx.textAlign = 'center';
    ctx.fillText(loc.name, canvas.width / 2, 50);
    
    if (inShop) {
        drawBlackMarket();
    } else if (loc.type === 'afk') {
        drawDocks();
    } else if (loc.type === 'grow') {
        drawOrchard();
    } else if (loc.type === 'lowrisk') {
        drawSuburbs();
    }
    
    // Back button
    ctx.fillStyle = '#ffff00';
    ctx.fillRect(20, canvas.height - 60, 100, 40);
    ctx.fillStyle = '#000';
    ctx.font = 'bold 14px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('ESC to Exit', 70, canvas.height - 40);
    
    // Draw player
    ctx.fillStyle = '#ffff00';
    ctx.fillRect(player.x - player.width/2, player.y - player.height/2, player.width, player.height);
    ctx.fillStyle = '#000000';
    ctx.font = 'bold 24px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('🍋', player.x, player.y);
}

function drawBlackMarket() {
    ctx.fillStyle = '#fff';
    ctx.font = '14px Arial';
    ctx.textAlign = 'left';
    ctx.fillText('🛍️ UPGRADE SHOP', 50, 100);
    
    shopItems.forEach((item, idx) => {
        const y = 120 + idx * 60;
        const purchased = upgrades.purchased.includes(item.id);
        
        ctx.fillStyle = purchased ? '#888888' : '#00ff00';
        ctx.fillRect(50, y, 300, 50);
        
        ctx.fillStyle = '#000';
        ctx.font = purchased ? 'italic 12px Arial' : 'bold 12px Arial';
        ctx.fillText(item.name, 60, y + 15);
        ctx.font = '10px Arial';
        ctx.fillText(item.effect, 60, y + 30);
        ctx.fillText(purchased ? 'OWNED' : `$${item.cost}`, 320, y + 25);
    });
    
    if (shopMessage) {
        ctx.fillStyle = '#ffff00';
        ctx.font = 'bold 16px Arial';
        ctx.textAlign = 'center';
        ctx.fillText(shopMessage, canvas.width / 2, 400);
    }
}

function drawDocks() {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('⚓ DOCKS - AFK HARVESTING ⚓', canvas.width / 2, 120);
    ctx.font = '14px Arial';
    ctx.fillText('Workers collect lemons while you relax', canvas.width / 2, 160);
    ctx.fillText('+2 Lemons every 2 seconds', canvas.width / 2, 200);
    ctx.fillText('+$5 every 2 seconds', canvas.width / 2, 240);
}

function drawOrchard() {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('🌿 UNDERGROUND ORCHARD 🌿', canvas.width / 2, 120);
    ctx.font = '14px Arial';
    ctx.fillText('Grow your own illegal fruits', canvas.width / 2, 160);
    ctx.fillText('+5 Lemons every 3 seconds', canvas.width / 2, 200);
    ctx.fillText('Low risk, requires patience', canvas.width / 2, 240);
    ctx.font = 'bold 16px Arial';
    ctx.fillText('🌱 Progress: ' + Math.floor(growTimer / 180 * 100) + '%', canvas.width / 2, 300);
}

function drawSuburbs() {
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 18px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('🏘️ SUBURBS - LOW RISK 🏘️', canvas.width / 2, 120);
    ctx.font = '14px Arial';
    ctx.fillText('Wealthy neighborhoods, cautious customers', canvas.width / 2, 160);
    ctx.fillText('Small profits, very low heat', canvas.width / 2, 200);
    ctx.font = 'bold 16px Arial';
    ctx.fillText('Customers come to you!', canvas.width / 2, 300);
}

function draw() {
    if (inLocation) {
        drawLocation();
    } else {
        drawWorldMap();
    }
}

function endGame(reason) {
    gameState = 'gameOver';
    document.getElementById('restartBtn').style.display = 'block';
    document.getElementById('gameMessage').textContent = `${reason}\n\nFinal Money: $${money}\nFinal Risk Level: ${Math.floor((riskLevel / maxRisk) * 100)}%`;
}

function gameLoop() {
    update();
    draw();
    
    if (gameState === 'playing') {
        requestAnimationFrame(gameLoop);
    }
}

draw();
    </script>
</body>
</html>
